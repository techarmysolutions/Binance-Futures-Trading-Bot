# Copy to config.yaml and edit. Secrets go in .env, NOT here.
start_equity: 1000

risk:
  risk_per_trade: 0.01      # 1% of equity risked per trade
  max_leverage: 5
  max_positions: 3
  daily_loss_limit: 0.05    # halt after -5% on the day
  max_drawdown: 0.20        # kill-switch at -20% from peak
  min_notional: 5.0

strategy_params:
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  atr_period: 14
  atr_mult: 2.0
  risk_reward: 2.0
